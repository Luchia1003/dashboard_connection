<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Detail — SKU Analytics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#0f172a',
            card: '#1e293b',
            border: '#334155',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; }
    .nav-link { transition: all 0.2s; }
    .nav-link:hover { background: #334155; }
    .nav-link.active { background: #0ea5e9; color: white; }
    .skeleton { background: linear-gradient(90deg, #1e293b 25%, #2d3f57 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 0.5rem; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .badge-up { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
    .badge-down { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .badge-warn { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
    .badge-danger { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .badge-neutral { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); }
    .toggle-btn { transition: all 0.15s; }
    .toggle-btn.active { background: #0ea5e9; color: white; }
    table th { position: sticky; top: 0; background: #1e293b; z-index: 10; }
    .sort-active { color: #0ea5e9; }
    tr:hover td { background: rgba(14,165,233,0.04); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Sidebar -->
  <aside class="fixed left-0 top-0 h-full w-56 bg-[#0a1628] border-r border-[#334155] z-40 flex flex-col">
    <div class="p-5 border-b border-[#334155]">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-sky-500 to-blue-600 flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
        </div>
        <span class="font-semibold text-white text-sm">Analytics</span>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <a href="index.html" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Sales Overview
      </a>
      <a href="product.html" class="nav-link active flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
        Product Detail
      </a>
    </nav>
    <div class="p-4 border-t border-[#334155]">
      <div id="lastUpdated" class="text-xs text-slate-500">Loading...</div>
    </div>
  </aside>

  <!-- Main -->
  <main class="ml-56 min-h-screen p-6">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-white">Product Detail</h1>
        <p class="text-slate-400 text-sm mt-1">SKU-level performance analytics</p>
      </div>
      <div id="loadingBadge" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-sky-500/10 border border-sky-500/30 text-sky-400 text-xs">
        <svg class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        Loading data...
      </div>
    </div>

    <!-- Controls -->
    <div class="card p-4 mb-5 flex flex-wrap items-center gap-4">
      <!-- Metric Toggle -->
      <div class="flex items-center gap-1 bg-[#0f1f35] rounded-lg p-1">
        <button class="toggle-btn active text-xs px-3 py-1.5 rounded-md font-medium" onclick="setMetricMode('net', this)">Net</button>
        <button class="toggle-btn text-xs px-3 py-1.5 rounded-md font-medium text-slate-400" onclick="setMetricMode('order', this)">Order</button>
        <button class="toggle-btn text-xs px-3 py-1.5 rounded-md font-medium text-slate-400" onclick="setMetricMode('refund', this)">Refund</button>
      </div>

      <div class="w-px h-6 bg-[#334155]"></div>

      <!-- Sort By -->
      <div class="flex items-center gap-2">
        <span class="text-xs text-slate-400">Sort by</span>
        <select id="sortSelect" class="bg-[#0f1f35] border border-[#334155] rounded-lg text-xs text-white px-3 py-1.5 focus:outline-none focus:border-sky-500">
          <option value="revenue">Revenue</option>
          <option value="profit">Profit</option>
          <option value="orders">Orders</option>
          <option value="returnRate">Return Rate</option>
        </select>
      </div>

      <!-- Show Top -->
      <div class="flex items-center gap-2">
        <span class="text-xs text-slate-400">Show</span>
        <select id="topSelect" class="bg-[#0f1f35] border border-[#334155] rounded-lg text-xs text-white px-3 py-1.5 focus:outline-none focus:border-sky-500">
          <option value="10">Top 10</option>
          <option value="20">Top 20</option>
          <option value="50">Top 50</option>
          <option value="100">Top 100</option>
        </select>
      </div>

      <!-- Date Range -->
      <div class="flex items-center gap-2 ml-auto">
        <span class="text-xs text-slate-400">From</span>
        <input type="date" id="dateFrom" class="bg-[#0f1f35] border border-[#334155] rounded-lg text-xs text-white px-3 py-1.5 focus:outline-none focus:border-sky-500" />
        <span class="text-xs text-slate-400">To</span>
        <input type="date" id="dateTo" class="bg-[#0f1f35] border border-[#334155] rounded-lg text-xs text-white px-3 py-1.5 focus:outline-none focus:border-sky-500" />
        <button onclick="clearDates()" class="text-xs text-slate-400 hover:text-white px-2 py-1.5">All Time</button>
      </div>
    </div>

    <!-- SKU Table -->
    <div class="card overflow-hidden mb-6">
      <div class="overflow-x-auto max-h-[560px] overflow-y-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-[#334155]">
              <th class="text-left px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider w-64">SKU / Product</th>
              <th class="text-right px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">Revenue</th>
              <th class="text-right px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">Profit</th>
              <th class="text-right px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">Orders</th>
              <th class="text-right px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider" id="marginHeader">Margin</th>
              <th class="text-right px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider" id="returnHeader">Return Rate</th>
              <th class="text-right px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">Rolling</th>
            </tr>
          </thead>
          <tbody id="skuTableBody">
            <tr><td colspan="7" class="p-8 text-center text-slate-500 text-sm">Loading SKU data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script src="js/sku.js"></script>
</body>
</html>
